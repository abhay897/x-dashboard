<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTOKEN Mining Bot</title>
    <!-- Tailwind CSS for Premium Dark UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Firebase App and Database SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        .crypto-glow {
            text-shadow: 0 0 15px rgba(234, 179, 8, 0.6);
        }
    </style>
</head>
<body class="bg-[#121214] text-white flex flex-col min-h-screen justify-between p-4 selection:bg-transparent">

    <!-- Top Header / User Profile -->
    <div class="flex items-center justify-between bg-[#1a1a1e] p-3 rounded-2xl border border-[#26262b] shadow-lg">
        <div class="flex items-center gap-3">
            <div id="user-avatar" class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center font-bold text-black text-lg">X</div>
            <div>
                <p id="user-name" class="font-semibold text-sm text-gray-200">Crypto Miner</p>
                <p class="text-xs text-yellow-500 font-medium tracking-wider">RANK: LEGEND</p>
            </div>
        </div>
        <div class="bg-[#26262b] px-3 py-1.5 rounded-xl text-xs text-gray-400 font-mono">
            Speed: <span class="text-yellow-400">0.0416 $X/hr</span>
        </div>
    </div>

    <!-- Main Mining Core -->
    <div class="flex flex-col items-center justify-center my-auto py-6">
        <p class="text-xs text-gray-400 uppercase tracking-widest mb-1 font-semibold">Your Balance</p>
        <!-- Real-time ticking balance -->
        <div class="text-4xl font-extrabold text-yellow-400 font-mono tracking-tight crypto-glow mb-8" id="balance-display">
            0.00000000
        </div>

        <!-- Big Interactive Mining Coin -->
        <div class="relative group cursor-pointer" id="mine-coin">
            <div class="absolute inset-0 bg-yellow-500/20 rounded-full blur-2xl group-active:blur-xl transition-all"></div>
            <div class="w-56 h-56 bg-gradient-to-b from-yellow-400 to-amber-600 rounded-full flex items-center justify-center border-4 border-yellow-300 shadow-[0_0_40px_rgba(234,179,8,0.4)] active:scale-95 transform transition-all duration-75 relative z-10">
                <span class="text-6xl font-black text-black select-none tracking-tighter">X</span>
            </div>
        </div>
        <p class="text-xs text-gray-500 mt-6 text-center italic">Mining runs automatically. Tap coin to sync with blockchain.</p>
    </div>

    <!-- Leaderboard & Referral Tabs Sections -->
    <div class="bg-[#1a1a1e] border border-[#26262b] rounded-2xl p-4 shadow-xl mb-2">
        <!-- Tabs Buttons -->
        <div class="flex bg-[#121214] p-1 rounded-xl mb-4">
            <button onclick="switchTab('leaderboard')" id="tab-leaderboard-btn" class="flex-1 py-2 text-center text-sm font-semibold rounded-lg bg-[#1a1a1e] text-yellow-400 transition-all">🏆 Leaderboard</button>
            <button onclick="switchTab('referral')" id="tab-referral-btn" class="flex-1 py-2 text-center text-sm font-semibold rounded-lg text-gray-400 transition-all">🔗 Invite Friends</button>
        </div>

        <!-- Leaderboard Tab Content -->
        <div id="tab-leaderboard" class="space-y-2 max-h-48 overflow-y-auto pr-1">
            <p class="text-center text-xs text-gray-500 py-4">Loading top miners...</p>
        </div>

        <!-- Referral Tab Content -->
        <div id="tab-referral" class="hidden text-center space-y-4 py-2">
            <p class="text-sm text-gray-300">Invite friends to boost your community and secure extra allocations!</p>
            <div class="bg-[#121214] p-3 rounded-xl border border-[#26262b] font-mono text-xs text-yellow-500 truncate" id="ref-link-display">
                Generating link...
            </div>
            <button onclick="shareInvite()" class="w-full bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-400 hover:to-amber-500 text-black font-bold py-3 rounded-xl transition-all text-sm shadow-md active:scale-[0.99]">
                Invite a Friend 🚀
            </button>
        </div>
    </div>

    <!-- Core App Logic Scripts -->
    <script>
        // ----------------------------------------------------
        // 1. FIREBASE CONFIGURATION (Apne Credentials Daalein)
        // ----------------------------------------------------
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ----------------------------------------------------
        // 2. CONFIGURATIONS & TELEGRAM INITIALIZATION
        // ----------------------------------------------------
        const tg = window.Telegram.WebApp;
        tg.expand(); // Full screen setup

        // Mock User Data for browser testing if Telegram is empty
        const user = tg.initDataUnsafe?.user || {
            id: 9999999, // Testing Mode Default ID
            first_name: "Local Tester",
            username: "tester"
        };

        // SHADOW MODE CONFIG: Yahan apni real Telegram ID daalo taaki aap leaderboard me na dikho
        const ADMIN_TELEGRAM_ID = "YOUR_OWN_TELEGRAM_ID_HERE"; 

        // Pi Coin Style Speed: 1 Token Per Day = 0.04166667 tokens per hour
        const MINING_SPEED_PER_HOUR = 1.0 / 24.0; 
        const MINING_SPEED_PER_SEC = MINING_SPEED_PER_HOUR / 3600.0;

        let currentBalance = 0.0;
        let lastSavedTime = Date.now();

        // Set UI info
        document.getElementById('user-name').innerText = user.first_name;
        if(user.first_name) {
            document.getElementById('user-avatar').innerText = user.first_name.charAt(0).toUpperCase();
        }

        // ----------------------------------------------------
        // 3. CORE MINING ENGINE (Local + Cloud Sync)
        // ----------------------------------------------------
        const userRef = database.ref('users/' + user.id);

        // Fetch User Data or Create New Account
        userRef.once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                lastSavedTime = data.lastSavedTime || Date.now();
                
                // Calculate offline mined tokens since user was away
                const timePassedSec = (Date.now() - lastSavedTime) / 1000;
                const offlineMined = timePassedSec * MINING_SPEED_PER_SEC;
                
                currentBalance = (data.balance || 0.0) + offlineMined;
            } else {
                // New User Setup: Safe Welcome Bonus = 1 $X
                currentBalance = 1.0; 
                lastSavedTime = Date.now();
                userRef.set({
                    username: user.username || "Anonymous",
                    firstName: user.first_name,
                    balance: currentBalance,
                    lastSavedTime: lastSavedTime
                });
            }
            startTicking();
        });

        // Local Ticking UI update every 50ms for buttery smooth numbers
        function startTicking() {
            setInterval(() => {
                currentBalance += MINING_SPEED_PER_SEC * 0.05;
                document.getElementById('balance-display').innerText = currentBalance.toFixed(8);
            }, 50);

            // Cloud Server Sync logic every 7 seconds
            setInterval(() => {
                syncWithDatabase();
            }, 7000);
        }

        function syncWithDatabase() {
            lastSavedTime = Date.now();
            userRef.update({
                balance: currentBalance,
                lastSavedTime: lastSavedTime
            });
        }

        // Tap coin manual sync event handler
        document.getElementById('mine-coin').addEventListener('click', () => {
            syncWithDatabase();
            // Subtle pulse haptic feedback on Telegram
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        // ----------------------------------------------------
        // 4. LEADERBOARD SYSTEM (Shadow Mode Included)
        // ----------------------------------------------------
        function loadLeaderboard() {
            const leaderboardTab = document.getElementById('tab-leaderboard');
            database.ref('users').orderByChild('balance').limitToLast(20).once('value').then((snapshot) => {
                leaderboardTab.innerHTML = "";
                let index = 1;
                let usersList = [];

                snapshot.forEach((childSnapshot) => {
                    const userId = childSnapshot.key;
                    // SHADOW MODE LOGIC: Agar user ID admin ki hai, toh use skip kar do
                    if (userId === ADMIN_TELEGRAM_ID) {
                        return; 
                    }
                    usersList.unshift({ id: userId, ...childSnapshot.val() });
                });

                if (usersList.length === 0) {
                    leaderboardTab.innerHTML = `<p class="text-center text-xs text-gray-500 py-4">No miners active yet.</p>`;
                    return;
                }

                usersList.forEach((u) => {
                    const row = document.createElement('div');
                    row.className = "flex items-center justify-between bg-[#121214] p-2.5 rounded-xl border border-[#26262b]/60 text-sm";
                    row.innerHTML = `
                        <div class="flex items-center gap-2">
                            <span class="w-5 font-mono text-xs text-gray-500 font-bold">${index++}.</span>
                            <span class="font-medium text-gray-200">${u.firstName}</span>
                        </div>
                        <span class="font-mono text-yellow-400 font-bold">${parseFloat(u.balance).toFixed(4)} $X</span>
                    `;
                    leaderboardTab.appendChild(row);
                });
            });
        }

        // ----------------------------------------------------
        // 5. REFERRAL LOOP LINK & UI NAVIGATION
        // ----------------------------------------------------
        // Dynamic referral link setup with bot name @xtokenminebot
        const referralLink = `https://t.me/xtokenminebot?start=${user.id}`;
        document.getElementById('ref-link-display').innerText = referralLink;

        function shareInvite() {
            const shareText = encodeURIComponent(`Bhai! Mera XTOKEN Mining Bot join kar aur free me $X tokens mine kar! Pi ki tarah iska rate tight hai, jaldi aao 🚀\nLink: ${referralLink}`);
            window.open(`https://t.me/share/url?url=${referralLink}&text=${shareText}`, '_blank');
        }

        function switchTab(tab) {
            const lbTab = document.getElementById('tab-leaderboard');
            const refTab = document.getElementById('tab-referral');
            const lbBtn = document.getElementById('tab-leaderboard-btn');
            const refBtn = document.getElementById('tab-referral-btn');

            if (tab === 'leaderboard') {
                lbTab.classList.remove('hidden');
                refTab.classList.add('hidden');
                lbBtn.className = "flex-1 py-2 text-center text-sm font-semibold rounded-lg bg-[#1a1a1e] text-yellow-400 transition-all";
                refBtn.className = "flex-1 py-2 text-center text-sm font-semibold rounded-lg text-gray-400 transition-all";
                loadLeaderboard();
            } else {
                lbTab.classList.add('hidden');
                refTab.classList.remove('hidden');
                lbBtn.className = "flex-1 py-2 text-center text-sm font-semibold rounded-lg text-gray-400 transition-all";
                refBtn.className = "flex-1 py-2 text-center text-sm font-semibold rounded-lg bg-[#1a1a1e] text-yellow-400 transition-all";
            }
        }

        // Load leaderboard on initial screen boot
        loadLeaderboard();
        
        // Sync before the window closes entirely
        window.addEventListener('beforeunload', () => {
            syncWithDatabase();
        });
    </script>
</body>
</html>
