<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTOKEN Mining Bot</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; -webkit-user-select: none; }
        .crypto-glow { text-shadow: 0 0 15px rgba(234, 179, 8, 0.6); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #26262b; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#121214] text-white flex flex-col min-h-screen justify-between p-4 selection:bg-transparent">

    <!-- TOP HEADER / PROFILE SECTION -->
    <div id="profile-section" class="flex items-center justify-between bg-[#1a1a1e] p-3 rounded-2xl border border-[#26262b] shadow-lg">
        <div class="flex items-center gap-3">
            <div id="user-avatar" class="w-10 h-10 bg-gradient-to-br from-yellow-400 to-amber-600 rounded-full flex items-center justify-center font-black text-black text-lg shadow-md">X</div>
            <div>
                <p id="user-name" class="font-bold text-sm text-gray-100">Loading...</p>
                <p id="user-uid" class="text-[10px] text-gray-500 font-mono">ID: Fetching...</p>
            </div>
        </div>
        <div class="flex flex-col items-end">
            <span id="speed-badge" class="bg-[#26262b] px-2.5 py-1 rounded-xl text-[11px] text-yellow-400 font-mono border border-yellow-500/20">
                0.0416 $X/hr
            </span>
            <span class="text-[9px] text-gray-400 mt-1 font-bold tracking-wider uppercase">Rank: Prospector</span>
        </div>
    </div>

    <!-- MAIN MINING CORE -->
    <div class="flex flex-col items-center justify-center my-auto py-4">
        <p class="text-xs text-gray-400 uppercase tracking-widest mb-1 font-semibold">Your Balance</p>
        <div class="text-4xl font-extrabold text-yellow-400 font-mono tracking-tight crypto-glow mb-6" id="balance-display">
            0.00000000
        </div>

        <div class="relative group cursor-pointer" id="mine-coin">
            <div class="absolute inset-0 bg-yellow-500/10 rounded-full blur-3xl group-active:blur-2xl transition-all"></div>
            <div class="w-52 h-52 bg-gradient-to-b from-yellow-400 to-amber-600 rounded-full flex items-center justify-center border-4 border-yellow-300 shadow-[0_0_35px_rgba(234,179,8,0.35)] active:scale-95 transform transition-all duration-75 relative z-10">
                <span class="text-6xl font-black text-black select-none tracking-tighter">X</span>
            </div>
        </div>
        <p class="text-[11px] text-gray-500 mt-5 text-center italic">Tap coin to instantly secure cloud sync node.</p>
    </div>

    <!-- NAVIGATION TABS & CONTENT SECTION -->
    <div class="bg-[#1a1a1e] border border-[#26262b] rounded-2xl p-4 shadow-xl mb-1">
        <div class="flex bg-[#121214] p-1 rounded-xl mb-4 gap-1 border border-[#26262b]/40">
            <button onclick="switchTab('leaderboard')" id="tab-leaderboard-btn" class="flex-1 py-2 text-center text-xs font-bold rounded-lg bg-[#1a1a1e] text-yellow-400 transition-all">🏆 Top</button>
            <button onclick="switchTab('tasks')" id="tab-tasks-btn" class="flex-1 py-2 text-center text-xs font-bold rounded-lg text-gray-400 transition-all">📋 Tasks</button>
            <button onclick="switchTab('referral')" id="tab-referral-btn" class="flex-1 py-2 text-center text-xs font-bold rounded-lg text-gray-400 transition-all">👥 Team</button>
        </div>

        <!-- Tab 1: Leaderboard -->
        <div id="tab-leaderboard" class="space-y-2 max-h-40 overflow-y-auto pr-1">
            <p class="text-center text-xs text-gray-500 py-4">Syncing leaderboard...</p>
        </div>

        <!-- Tab 2: Tasks Section -->
        <div id="tab-tasks" class="hidden space-y-2.5 max-h-40 overflow-y-auto pr-1">
            <div class="flex items-center justify-between bg-[#121214] p-3 rounded-xl border border-[#26262b] text-sm">
                <div class="flex flex-col">
                    <span class="font-bold text-gray-200 text-xs">Join Our Telegram Channel</span>
                    <span class="text-[10px] text-yellow-500 font-mono font-bold">+2.0000 $X</span>
                </div>
                <a href="https://t.me/xtokenmine" target="_blank" onclick="claimTask(this)" class="bg-yellow-500 hover:bg-yellow-400 text-black font-extrabold text-xs px-3 py-1.5 rounded-lg shadow transition-all">
                    Join 🚀
                </a>
            </div>
        </div>

        <!-- Tab 3: Referral & Team View -->
        <div id="tab-referral" class="hidden space-y-3">
            <div class="bg-[#121214] p-2.5 rounded-xl border border-[#26262b] font-mono text-xs text-yellow-500 truncate text-center" id="ref-link-display">
                Generating link...
            </div>
            <button onclick="shareInvite()" class="w-full bg-gradient-to-r from-yellow-500 to-amber-600 text-black font-bold py-2 rounded-xl text-xs active:scale-95">
                Invite Friend (Speed +10%) 🚀
            </button>
            <div class="border-t border-[#26262b] pt-2">
                <p class="text-[11px] font-bold uppercase tracking-wider text-gray-400 mb-2">Your Mining Team:</p>
                <div id="team-list" class="space-y-1.5 max-h-24 overflow-y-auto text-xs">
                    <p class="text-gray-500 italic text-[11px]">No active network peers found.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBOXmp-vL-Udqr-vIp-HpnOQ-l_PX4RVVE", 
            authDomain: "x-token.firebaseapp.com",
            databaseURL: "https://x-token-default-rtdb.firebaseio.com",
            projectId: "x-token",
            storageBucket: "x-token.appspot.com",
            messagingSenderId: "1087681429494", 
            appId: "1:1087681429494:web:f36076f7cfd3ce4c6151d7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user || { id: 7777777, first_name: "Miner_Guest", username: "guest_x" };
        document.getElementById('user-name').innerText = user.first_name;
        document.getElementById('user-uid').innerText = "ID: " + user.id;
        document.getElementById('user-avatar').innerText = user.first_name.charAt(0).toUpperCase();

        const BASE_SPEED_PER_SEC = 1.0 / 86400.0; // 1 Token per 24 Hours base speed
        let currentSpeedPerSec = BASE_SPEED_PER_SEC;

        let currentBalance = 0.0; 
        let lastSavedTime = Date.now();
        let userRef = database.ref('users/' + user.id);

        const localCacheKey = 'xtoken_balance_' + user.id;
        const cachedBalance = localStorage.getItem(localCacheKey);
        const cachedTime = localStorage.getItem('xtoken_last_time_' + user.id);

        // PI NETWORK OFFLINE CALCULATOR
        if (cachedBalance && cachedTime) {
            const timeDiffSec = (Date.now() - parseInt(cachedTime)) / 1000;
            const offlineMinedInstant = timeDiffSec * BASE_SPEED_PER_SEC; // Instantly add estimated offline progress
            currentBalance = parseFloat(cachedBalance) + offlineMinedInstant;
            document.getElementById('balance-display').innerText = currentBalance.toFixed(8);
        } else if (cachedBalance) {
            currentBalance = parseFloat(cachedBalance);
            document.getElementById('balance-display').innerText = currentBalance.toFixed(8);
        }

        userRef.once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                lastSavedTime = data.lastSavedTime || Date.now();
                
                const teamCount = parseInt(data.team_members_count || 0);
                const boostFactor = 1.0 + (teamCount * 0.10); 
                currentSpeedPerSec = BASE_SPEED_PER_SEC * boostFactor;
                
                document.getElementById('speed-badge').innerText = (currentSpeedPerSec * 3600).toFixed(4) + " $X/hr";

                // Precise database-level calculation for offline mining
                const timePassedSec = (Date.now() - lastSavedTime) / 1000;
                const offlineMined = timePassedSec * currentSpeedPerSec;
                
                currentBalance = parseFloat(data.balance || 0.0) + offlineMined;
                localStorage.setItem(localCacheKey, currentBalance);
                localStorage.setItem('xtoken_last_time_' + user.id, Date.now());
            } else {
                if (!cachedBalance) currentBalance = 0.0;
                lastSavedTime = Date.now();
                userRef.set({
                    username: user.username || "Anonymous",
                    firstName: user.first_name || "Miner",
                    balance: currentBalance,
                    lastSavedTime: lastSavedTime,
                    team_members_count: 0
                });
            }
        }).catch((err) => {
            console.log("Database read delayed, using local cache structural node.");
        }).finally(() => {
            if(!window.tickingStarted) {
                startTicking();
                window.tickingStarted = true;
            }
            loadTeamData();
        });

        function startTicking() {
            setInterval(() => {
                currentBalance += currentSpeedPerSec * 0.05;
                document.getElementById('balance-display').innerText = currentBalance.toFixed(8);
                // Har tick par memory update taaki real-time tracking rahe
                localStorage.setItem(localCacheKey, currentBalance); 
                localStorage.setItem('xtoken_last_time_' + user.id, Date.now());
            }, 50);
            setInterval(() => { syncWithDatabase(); }, 5000); 
        }

        function syncWithDatabase() {
            lastSavedTime = Date.now();
            userRef.update({ balance: currentBalance, lastSavedTime: lastSavedTime });
        }

        document.getElementById('mine-coin').addEventListener('click', () => {
            syncWithDatabase();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        function claimTask(element) {
            currentBalance += 2.0; 
            syncWithDatabase();
            element.className = "bg-green-600 text-white font-bold text-xs px-2.5 py-1.5 rounded-lg cursor-not-allowed pointer-events-none";
            element.innerText = "Claimed ✓";
        }

        // Rest of your functions (LoadTeam, Leaderboard, switchTab) remain unchanged
        function loadTeamData() {
            const teamListDiv = document.getElementById('team-list');
            database.ref('users').orderByChild('referred_by').equalTo(String(user.id)).once('value').then((snapshot) => {
                if(snapshot.exists()) {
                    teamListDiv.innerHTML = "";
                    snapshot.forEach((child) => {
                        const val = child.val();
                        const member = document.createElement('div');
                        member.className = "flex justify-between bg-[#121214] p-2 rounded-xl border border-[#26262b]/50";
                        member.innerHTML = `<span class="text-gray-300">⚡ ${val.firstName}</span><span class="text-yellow-500 font-mono font-bold">+10% Boost</span>`;
                        teamListDiv.appendChild(member);
                    });
                }
            });
        }

        function loadLeaderboard() {
            const leaderboardTab = document.getElementById('tab-leaderboard');
            leaderboardTab.innerHTML = "";
            
            const targetedGlobalUsers = [
                { name: "Aarav Sharma 🇮🇳", bal: 482.110 },
                { name: "xtoken_rahul 🇮🇳", bal: 395.405 },
                { name: "John_X 🇺🇸", bal: 310.290 },
                { name: "Priya Patel 🇮🇳", bal: 275.180 },
                { name: "🍁 Liam_Crypto 🇨🇦", bal: 220.840 },
                { name: "Oliver_Mining 🇬🇧", bal: 184.920 },
                { name: "Rohan_Gurung 🇳🇵", bal: 142.300 }
            ];

            let index = 1;
            targetedGlobalUsers.forEach((u) => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between bg-[#121214] p-2 rounded-xl border border-[#26262b]/60 text-xs";
                row.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="font-mono font-bold text-gray-500">${index++}.</span>
                        <span class="font-medium text-gray-300">${u.name}</span>
                    </div>
                    <span class="font-mono text-yellow-400 font-bold">${u.bal.toFixed(3)} $X</span>
                `;
                leaderboardTab.appendChild(row);
            });
        }

        const referralLink = `https://t.me/xtokenminebot?start=${user.id}`;
        document.getElementById('ref-link-display').innerText = referralLink;

        function shareInvite() {
            const shareText = encodeURIComponent(`Bhai! Mera XTOKEN Mining Network join kar aur free me $X tokens mine kar! Pi Network jaisa speed boost mil raha hai team banane par 🚀\nLink: ${referralLink}`);
            window.open(`https://t.me/share/url?url=${referralLink}&text=${shareText}`, '_blank');
        }

        function switchTab(tab) {
            const lbTab = document.getElementById('tab-leaderboard');
            const tasksTab = document.getElementById('tab-tasks');
            const refTab = document.getElementById('tab-referral');
            const lbBtn = document.getElementById('tab-leaderboard-btn');
            const tasksBtn = document.getElementById('tab-tasks-btn');
            const refBtn = document.getElementById('tab-referral-btn');

            lbTab.classList.add('hidden'); tasksTab.classList.add('hidden'); refTab.classList.add('hidden');
            lbBtn.className = tasksBtn.className = refBtn.className = "flex-1 py-2 text-center text-xs font-bold rounded-lg text-gray-400 transition-all";

            if (tab === 'leaderboard') {
                lbTab.classList.remove('hidden');
                lbBtn.className = "flex-1 py-2 text-center text-xs font-bold rounded-lg bg-[#1a1a1e] text-yellow-400 transition-all";
                loadLeaderboard();
            } else if (tab === 'tasks') {
                tasksTab.classList.remove('hidden');
                tasksBtn.className = "flex-1 py-2 text-center text-xs font-bold rounded-lg bg-[#1a1a1e] text-yellow-400 transition-all";
            } else {
                refTab.classList.remove('hidden');
                refBtn.className = "flex-1 py-2 text-center text-xs font-bold rounded-lg bg-[#1a1a1e] text-yellow-400 transition-all";
                loadTeamData();
            }
        }
        loadLeaderboard();
    </script>
</body>
</html>
